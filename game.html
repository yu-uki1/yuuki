<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Yuuki's Catch-Quest</title>
    <style>
        * { box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; background: #f4f4f9; color: #333; 
            overflow: hidden; touch-action: none;
        }
        header { 
            display: flex; justify-content: space-between; align-items: center; 
            background-color: #FF69B4; padding: 10px 20px; color: white; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        main { max-width: 800px; margin: 10px auto; padding: 5px; text-align: center; }
        
        #game-container {
            position: relative;
            max-width: 400px;
            margin: 0 auto;
            border: 3px solid #FF69B4;
            border-radius: 15px;
            background: white;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        canvas { background: #fffafa; display: block; width: 100%; height: auto; }

        .ui { 
            position: absolute; top: 10px; width: 100%; 
            display: flex; justify-content: space-around; 
            font-weight: bold; color: #FF69B4; pointer-events: none; z-index: 5;
        }

        /* Touch-Steuerung Flächen */
        .touch-controls {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 80%;
            display: flex; z-index: 4;
        }
        .touch-area { flex: 1; height: 100%; }

        #start-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.95);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 10; padding: 20px;
        }
        #start-btn {
            padding: 15px 40px; background: #FF69B4; color: white; border: none;
            border-radius: 50px; font-size: 1.2rem; cursor: pointer; font-weight: bold;
        }
    </style>
</head>
<body>

<header>
    <strong>Yuuki's Website</strong>
    <nav style="font-size: 0.8rem;"><a href="index.html" style="color:white; text-decoration:none;">Menü</a></nav>
</header>

<main>
    <div id="game-container">
        <div class="ui">
            <span>Punkte: <span id="score">0</span></span>
            <span>Leben: <span id="lives">3</span></span>
        </div>

        <div class="touch-controls">
            <div class="touch-area" id="left-touch"></div>
            <div class="touch-area" id="right-touch"></div>
        </div>
        
        <div id="start-overlay">
            <h2 style="color: #FF69B4;">Manga Catch!</h2>
            <p style="font-size: 0.9rem;">PC: Pfeiltasten<br>Handy: Links/Rechts tippen</p>
            <button id="start-btn">START</button>
        </div>

        <canvas id="gameCanvas" width="400" height="600"></canvas>
    </div>
</main>

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    const startBtn = document.getElementById("start-btn");
    const startOverlay = document.getElementById("start-overlay");
    
    let score = 0;
    let lives = 3;
    let gameActive = false;
    let baseSpeed = 3;

    const player = { x: 175, y: 510, size: 50, speed: 9, color: "#FF69B4" };
    const items = [];
    const keys = {};

    // --- STEUERUNG LOGIK ---
    window.addEventListener("keydown", e => keys[e.key] = true);
    window.addEventListener("keyup", e => keys[e.key] = false);

    // Touch-Steuerung
    let leftPressed = false;
    let rightPressed = false;

    document.getElementById("left-touch").addEventListener("touchstart", (e) => { e.preventDefault(); leftPressed = true; });
    document.getElementById("left-touch").addEventListener("touchend", () => leftPressed = false);
    document.getElementById("right-touch").addEventListener("touchstart", (e) => { e.preventDefault(); rightPressed = true; });
    document.getElementById("right-touch").addEventListener("touchend", () => rightPressed = false);

    startBtn.addEventListener("click", () => {
        gameActive = true;
        startOverlay.style.display = "none";
        spawnItem();
        draw();
    });

    function spawnItem() {
        if (!gameActive) return;
        
        // Schwierigkeit: Schneller pro 50 Punkte
        let speedBoost = 1 + (Math.floor(score / 50) * 0.25);
        const isGood = Math.random() > 0.35; 

        items.push({
            x: Math.random() * (canvas.width - 30),
            y: -30,
            size: 20,
            speed: (baseSpeed + Math.random() * 2) * speedBoost,
            type: isGood ? 'good' : 'bad'
        });

        let nextSpawn = Math.max(300, 850 - (score * 2));
        setTimeout(spawnItem, nextSpawn);
    }

    function update() {
        if (!gameActive) return;

        // Kombinierte Steuerung (Tastatur + Touch)
        if ((keys["ArrowLeft"] || keys["a"] || leftPressed) && player.x > 0) player.x -= player.speed;
        if ((keys["ArrowRight"] || keys["d"] || rightPressed) && player.x < canvas.width - player.size) player.x += player.speed;

        items.forEach((item, index) => {
            item.y += item.speed;

            if (item.y + item.size > player.y && 
                item.x + item.size > player.x && 
                item.x < player.x + player.size &&
                item.y < player.y + player.size) {
                
                if (item.type === 'good') {
                    score += 10;
                    document.getElementById("score").innerText = score;
                } else {
                    lives--;
                    document.getElementById("lives").innerText = lives;
                    if (lives <= 0) {
                        gameActive = false;
                        alert("Game Over! Score: " + score);
                        location.reload();
                    }
                }
                items.splice(index, 1);
            }
            if (item.y > canvas.height) items.splice(index, 1);
        });
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Spieler mit Leuchteffekt
        ctx.shadowBlur = 15; ctx.shadowColor = "#FF69B4";
        ctx.fillStyle = player.color;
        ctx.fillRect(player.x, player.y, player.size, player.size);
        ctx.shadowBlur = 0;

        // Items
        items.forEach(item => {
            ctx.fillStyle = item.type === 'good' ? '#2ecc71' : '#e74c3c';
            ctx.beginPath();
            ctx.arc(item.x + item.size/2, item.y + item.size/2, item.size/2, 0, Math.PI*2);
            ctx.fill();
        });

        update();
        if (gameActive) requestAnimationFrame(draw);
    }
</script>
</body>
</html>
