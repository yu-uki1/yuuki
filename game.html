<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Yuuki's Gyro-Game</title>
    <style>
        * { box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; background: #f4f4f9; color: #333; 
            overflow: hidden; /* Verhindert Scrollen beim Spielen */
        }
        header { 
            display: flex; justify-content: space-between; align-items: center; 
            background-color: #FF69B4; padding: 15px; color: white; 
        }
        main { max-width: 800px; margin: 10px auto; padding: 10px; text-align: center; }
        #game-wrapper {
            position: relative;
            background: white;
            border: 3px solid #FF69B4;
            border-radius: 15px;
            overflow: hidden;
            touch-action: none; /* Deaktiviert Zoom/Scroll auf dem Canvas */
        }
        canvas { background: #fffafa; display: block; width: 100%; height: auto; }
        .ui { position: absolute; top: 10px; width: 100%; display: flex; justify-content: space-around; font-weight: bold; color: #FF69B4; pointer-events: none; }
        #start-btn {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            padding: 15px 30px; background: #FF69B4; color: white; border: none;
            border-radius: 30px; font-size: 1.2rem; cursor: pointer; z-index: 10;
        }
    </style>
</head>
<body>

<header>
    <strong>Yuuki's Website</strong>
    <div style="font-size: 0.8rem;">Neige dein Handy zum Steuern!</div>
</header>

<main>
    <div id="game-wrapper">
        <div class="ui">
            <span>Punkte: <span id="score">0</span></span>
            <span>Leben: <span id="lives">3</span></span>
        </div>
        <button id="start-btn">Spiel starten & Sensor erlauben</button>
        <canvas id="gameCanvas" width="400" height="600"></canvas>
    </div>
</main>

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    const startBtn = document.getElementById("start-btn");
    
    let score = 0;
    let lives = 3;
    let gameActive = false;
    let tiltX = 0; // Neigungswinkel

    const player = { x: 180, y: 520, size: 40, color: "#FF69B4" };
    const items = [];

    // --- SENSOR LOGIK ---
    startBtn.addEventListener("click", () => {
        // Für iOS 13+ muss die Berechtigung explizit angefragt werden
        if (typeof DeviceOrientationEvent.requestPermission === 'function') {
            DeviceOrientationEvent.requestPermission()
                .then(permissionState => {
                    if (permissionState === 'granted') {
                        window.addEventListener("deviceorientation", handleOrientation);
                        startGame();
                    }
                });
        } else {
            // Android & ältere Browser
            window.addEventListener("deviceorientation", handleOrientation);
            startGame();
        }
    });

    function handleOrientation(event) {
        // gamma ist die Neigung nach links/rechts (-90 bis 90)
        tiltX = event.gamma; 
    }

    function startGame() {
        gameActive = true;
        startBtn.style.display = "none";
        spawnItem();
        draw();
    }

    function spawnItem() {
        if (!gameActive) return;
        const isGood = Math.random() > 0.3; // 70% grüne Punkte, 30% rote
        items.push({
            x: Math.random() * (canvas.width - 20),
            y: -20,
            size: 15,
            speed: 2 + Math.random() * 4,
            type: isGood ? 'good' : 'bad'
        });
        setTimeout(spawnItem, 800); // Alle 0.8 Sek ein neuer Punkt
    }

    function update() {
        if (!gameActive) return;

        // Charakter bewegen basierend auf Neigung (Empfindlichkeit anpassen)
        player.x += tiltX * 0.5;

        // Grenzen einhalten
        if (player.x < 0) player.x = 0;
        if (player.x > canvas.width - player.size) player.x = canvas.width - player.size;

        items.forEach((item, index) => {
            item.y += item.speed;

            // Kollisionsabfrage
            if (item.y + item.size > player.y && 
                item.x + item.size > player.x && 
                item.x < player.x + player.size &&
                item.y < player.y + player.size) {
                
                if (item.type === 'good') {
                    score += 10;
                    document.getElementById("score").innerText = score;
                } else {
                    lives--;
                    document.getElementById("lives").innerText = lives;
                    if (lives <= 0) {
                        gameActive = false;
                        alert("Game Over! Score: " + score);
                        location.reload();
                    }
                }
                items.splice(index, 1);
            }

            // Aus dem Bild gefallene Items entfernen
            if (item.y > canvas.height) items.splice(index, 1);
        });
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Spieler
        ctx.fillStyle = player.color;
        ctx.fillRect(player.x, player.y, player.size, player.size);

        // Items
        items.forEach(item => {
            ctx.fillStyle = item.type === 'good' ? '#2ecc71' : '#e74c3c';
            ctx.beginPath();
            ctx.arc(item.x + item.size/2, item.y + item.size/2, item.size/2, 0, Math.PI*2);
            ctx.fill();
        });

        update();
        if (gameActive) requestAnimationFrame(draw);
    }
</script>
</body>
</html>
