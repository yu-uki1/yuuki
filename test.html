<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yuuki's Bildergalerie</title>
    <style>
        /* 🔥 Stabilitäts-Fixes */
        * {
            box-sizing: border-box;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
            background: #f4f4f9; 
            color: #333; 
            overflow-x: hidden;
        }

        header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            background-color: #FF69B4; 
            padding: 15px 30px; 
            color: white; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            width: 100%;
        }

        header a { 
            color: white; 
            text-decoration: none; 
            margin: 0 15px; 
            font-weight: bold;
        }

        header a:hover { text-decoration: underline; }

        nav {
            display: flex;
        }

        main { 
            max-width: 900px; 
            margin: 30px auto; 
            padding: 20px; 
            background: white; 
            border-radius: 10px; 
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            width: calc(100% - 40px);
            text-align: center; /* Zentriert die Überschrift und Posts */
        }

        h1 { color: #FF69B4; }

        /* 📸 Galerie-Container */
        .gallery {
            display: flex;
            flex-direction: column;
            align-items: center; /* Zentriert die Insta-Posts */
            gap: 40px;
            margin-top: 20px;
        }

        /* ✨ Animationen */
        .fade-in-top {
            opacity: 0;
            transform: translateY(-30px);
            animation: fadeInTop 0.8s ease forwards;
        }

        @keyframes fadeInTop {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 🍔 Burger Button */
        .menu-toggle {
            display: none;
            font-size: 26px;
            cursor: pointer;
            user-select: none;
        }

        /* 📱 Mobile Ansicht */
        @media (max-width: 768px) {
            header { flex-wrap: wrap; }
            .menu-toggle { display: block; }
            nav {
                display: none;
                flex-direction: column;
                width: 100%;
                margin-top: 10px;
            }
            nav.active { display: flex; }
            header a { margin: 10px 0; padding: 8px 0; }
        }

        footer {
            width: 100%;
            text-align: center;
            padding: 20px;
            background: #eee;
            border-top: 2px solid #FF69B4;
            color: #333;
            font-size: 13px;
            margin-top: 50px;
        }
    </style>
</head>
